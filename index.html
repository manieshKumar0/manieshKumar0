<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chrome Dino Game</title>
  <style>
    body {
      margin: 0;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: monospace;
    }

    canvas {
      background: #fff;
      border: 2px solid #333;
    }
  </style>
</head>
<body>

<canvas id="game" width="800" height="200"></canvas>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  let dino = { x: 50, y: 150, w: 40, h: 40, vy: 0, jumping: false };
  let gravity = 1.2;
  let cactus = { x: 800, y: 160, w: 20, h: 40 };
  let score = 0;
  let gameOver = false;

  function drawDino() {
    ctx.fillStyle = "#333";
    ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
  }

  function drawCactus() {
    ctx.fillStyle = "#228B22";
    ctx.fillRect(cactus.x, cactus.y, cactus.w, cactus.h);
  }

  function drawScore() {
    ctx.fillStyle = "#000";
    ctx.font = "16px monospace";
    ctx.fillText("Score: " + score, 650, 30);
  }

  function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    dino.vy += gravity;
    dino.y += dino.vy;

    if (dino.y >= 150) {
      dino.y = 150;
      dino.vy = 0;
      dino.jumping = false;
    }

    cactus.x -= 6;
    if (cactus.x < -cactus.w) {
      cactus.x = 800;
      score++;
    }

    if (
      dino.x < cactus.x + cactus.w &&
      dino.x + dino.w > cactus.x &&
      dino.y < cactus.y + cactus.h &&
      dino.y + dino.h > cactus.y
    ) {
      gameOver = true;
      ctx.font = "24px monospace";
      ctx.fillText("GAME OVER", 320, 100);
    }

    drawDino();
    drawCactus();
    drawScore();

    requestAnimationFrame(update);
  }

  document.addEventListener("keydown", (e) => {
    if (e.code === "Space" && !dino.jumping) {
      dino.vy = -18;
      dino.jumping = true;
    }
  });

  update();
</script>

</body>
</html>
